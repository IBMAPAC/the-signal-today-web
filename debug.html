<!DOCTYPE html>
<html>
<head>
    <title>Button Debug Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .log { margin: 5px 0; padding: 5px; }
        .error { background: #fee; color: red; }
        .success { background: #efe; color: green; }
        .info { background: #eef; color: blue; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Button Debug Test</h1>
    <div id="log"></div>
    
    <h2>Step 1: Script Loading</h2>
    <div id="load-status"></div>
    
    <h2>Step 2: App Object Check</h2>
    <div id="app-status"></div>
    
    <h2>Step 3: Manual Button Test</h2>
    <button onclick="testAppRefresh()">Test app.refresh()</button>
    <button onclick="testAppSettings()">Test app.openSettings()</button>
    <button onclick="testOpenClientManager()">Test openClientManager()</button>
    <div id="test-result"></div>
    
    <h2>Console Output (errors will appear here)</h2>
    <pre id="console-output"></pre>

    <script>
        // Capture all console output
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleOutput.textContent += '[LOG] ' + args.join(' ') + '\n';
        };
        console.error = function(...args) {
            originalError.apply(console, args);
            consoleOutput.textContent += '[ERROR] ' + args.join(' ') + '\n';
        };
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            consoleOutput.textContent += '[WARN] ' + args.join(' ') + '\n';
        };
        
        // Capture global errors
        window.onerror = function(msg, url, line, col, error) {
            consoleOutput.textContent += '[GLOBAL ERROR] ' + msg + ' at line ' + line + '\n';
            if (error && error.stack) {
                consoleOutput.textContent += error.stack + '\n';
            }
            return false;
        };
        
        // Capture unhandled promise rejections
        window.onunhandledrejection = function(event) {
            consoleOutput.textContent += '[PROMISE REJECTION] ' + event.reason + '\n';
        };
        
        function log(msg, type) {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = msg;
            document.getElementById('log').appendChild(div);
        }
    </script>
    
    <!-- Load the app scripts -->
    <script>
        log('Loading sources.js...', 'info');
    </script>
    <script src="sources.js" onerror="log('Failed to load sources.js', 'error')"></script>
    <script>
        if (typeof DEFAULT_SOURCES !== 'undefined') {
            document.getElementById('load-status').innerHTML = '<div class="log success">✅ sources.js loaded (' + DEFAULT_SOURCES.length + ' sources)</div>';
        } else {
            document.getElementById('load-status').innerHTML = '<div class="log error">❌ sources.js failed - DEFAULT_SOURCES undefined</div>';
        }
        log('Loading app.js...', 'info');
    </script>
    <script src="app.js" onerror="log('Failed to load app.js', 'error')"></script>
    <script>
        // Check app status after scripts load
        setTimeout(function() {
            const status = document.getElementById('app-status');
            let html = '';
            
            html += '<div class="log ' + (typeof SignalApp !== 'undefined' ? 'success' : 'error') + '">';
            html += 'SignalApp class: ' + (typeof SignalApp !== 'undefined' ? '✅ defined' : '❌ undefined');
            html += '</div>';
            
            html += '<div class="log ' + (typeof app !== 'undefined' ? 'success' : 'error') + '">';
            html += 'app variable: ' + (typeof app !== 'undefined' ? '✅ exists' : '❌ undefined');
            html += '</div>';
            
            html += '<div class="log ' + (typeof window.app !== 'undefined' ? 'success' : 'error') + '">';
            html += 'window.app: ' + (typeof window.app !== 'undefined' ? '✅ exists' : '❌ undefined');
            html += '</div>';
            
            if (typeof app !== 'undefined') {
                html += '<div class="log ' + (typeof app.refresh === 'function' ? 'success' : 'error') + '">';
                html += 'app.refresh: ' + (typeof app.refresh === 'function' ? '✅ function' : '❌ ' + typeof app.refresh);
                html += '</div>';
                
                html += '<div class="log ' + (typeof app.openSettings === 'function' ? 'success' : 'error') + '">';
                html += 'app.openSettings: ' + (typeof app.openSettings === 'function' ? '✅ function' : '❌ ' + typeof app.openSettings);
                html += '</div>';
            }
            
            html += '<div class="log ' + (typeof openClientManager === 'function' ? 'success' : 'error') + '">';
            html += 'openClientManager: ' + (typeof openClientManager === 'function' ? '✅ function' : '❌ undefined');
            html += '</div>';
            
            status.innerHTML = html;
        }, 500);
        
        function testAppRefresh() {
            const result = document.getElementById('test-result');
            try {
                result.innerHTML = '<div class="log info">Calling app.refresh()...</div>';
                if (typeof app === 'undefined') {
                    throw new Error('app is undefined');
                }
                if (typeof app.refresh !== 'function') {
                    throw new Error('app.refresh is not a function: ' + typeof app.refresh);
                }
                app.refresh();
                result.innerHTML += '<div class="log success">✅ app.refresh() called successfully</div>';
            } catch(e) {
                result.innerHTML += '<div class="log error">❌ Error: ' + e.message + '</div>';
            }
        }
        
        function testAppSettings() {
            const result = document.getElementById('test-result');
            try {
                result.innerHTML = '<div class="log info">Calling app.openSettings()...</div>';
                app.openSettings();
                result.innerHTML += '<div class="log success">✅ app.openSettings() called successfully</div>';
            } catch(e) {
                result.innerHTML += '<div class="log error">❌ Error: ' + e.message + '</div>';
            }
        }
        
        function testOpenClientManager() {
            const result = document.getElementById('test-result');
            try {
                result.innerHTML = '<div class="log info">Calling openClientManager()...</div>';
                openClientManager();
                result.innerHTML += '<div class="log success">✅ openClientManager() called successfully</div>';
            } catch(e) {
                result.innerHTML += '<div class="log error">❌ Error: ' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
